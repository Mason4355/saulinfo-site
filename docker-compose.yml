services:
  saulinfo-site:
    image: ${SAULINFO_SITE_IMAGE:-ghcr.io/mason4355/saulinfo-site:main}
    build: .
    restart: unless-stopped
    container_name: saulinfo-site
    ports:
      - "127.0.0.1:${SAULINFO_PUBLIC_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ${SHOP_UPDATE_DATA_DIR:-/root/shop-update/data}:/integrations/shop-update
