{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<main class="auth-layout">
  <section class="auth-card">
    <span class="eyebrow">Новый доступ</span>
    <h1>Создание аккаунта SaulInfo</h1>
    <p>Заполните e-mail и пароль. Если у вас уже есть пользователь в системе, можно сразу привязать аккаунт по Telegram ID.</p>

    <form method="post" class="auth-form">
      <label class="form-label">
        <span>E-mail</span>
        <input type="email" name="email" placeholder="name@example.com" required />
      </label>
      <label class="form-label">
        <span>Пароль</span>
        <input type="password" name="password" placeholder="Пароль не короче 6 символов" required />
      </label>
      <label class="form-label">
        <span>Telegram ID</span>
        <input type="number" name="linked_shop_user_id" placeholder="Необязательно" />
      </label>
      <div class="auth-actions">
        <button type="submit" class="button primary wide">Создать аккаунт</button>
      </div>
    </form>

    <div class="muted auth-link-row">
      Уже есть аккаунт? <a href="{{ url_for('login_page') }}">Войти</a>
    </div>
  </section>
</main>
{% endblock %}
