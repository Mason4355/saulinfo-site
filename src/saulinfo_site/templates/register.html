{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<main class="auth-layout">
  <section class="card auth-card">
    <span class="eyebrow">Новый аккаунт</span>
    <h1>Регистрация по e-mail</h1>
    <p>Если знаете свой ID в текущей системе, можно сразу привязать кабинет к данным из `shop-update`.</p>

    <form method="post" class="auth-form">
      <input type="email" name="email" placeholder="Ваш e-mail" required />
      <input type="password" name="password" placeholder="Пароль не короче 6 символов" required />
      <input type="number" name="linked_shop_user_id" placeholder="ID пользователя в shop-update (необязательно)" />
      <button type="submit" class="button primary wide">Создать аккаунт</button>
    </form>

    <div class="muted auth-link-row">
      Уже есть аккаунт? <a href="{{ url_for('login_page') }}">Войти</a>
    </div>
  </section>
</main>
{% endblock %}
